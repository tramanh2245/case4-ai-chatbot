spring.application.name=chatbot
server.port=8080

# SQLite Database (data lưu vĩnh viễn)
spring.datasource.url=jdbc:sqlite:./data/chatbot.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Gemini API (set via env var GEMINI_API_KEY or pass from Flutter)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# CORS - allow Flutter app
app.cors.allowed-origins=*

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.com.case4=INFO
